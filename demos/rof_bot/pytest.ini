[pytest]
# ROF Bot demo — pytest configuration
# Run from the rof project root:
#   pytest demos/rof_bot/tests/ -v --tb=short
# Or from demos/rof_bot/:
#   pytest tests/ -v --tb=short

testpaths     = tests
addopts       = -v --tb=short
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Disable coverage by default for the demo — enable explicitly:
#   pytest --cov=bot_service --cov=tools --cov-report=term-missing
# (coverage is configured in the root pyproject.toml for the framework itself)

# Running subsets:
#   Fast tests only (skip pipeline.run() calls):
#     pytest tests/ -m "not slow"
#   Integration tests that invoke the full pipeline runner:
#     pytest tests/ -m slow
#   Unit tests only:
#     pytest tests/unit/
#   Integration structural tests only (no pipeline.run()):
#     pytest tests/integration/ -m "not slow"

markers =
    integration: marks tests that exercise the full pipeline (may be slower)
    unit: marks isolated unit tests with no external dependencies
    slow: marks tests that take more than 5 seconds
    requires_framework: marks tests that require rof_framework to be installed

# Filter out common noisy warnings from optional dependencies
filterwarnings =
    ignore::DeprecationWarning:apscheduler
    ignore::DeprecationWarning:sqlalchemy
    ignore::DeprecationWarning:pydantic
    ignore::PendingDeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning
    ignore:.*distutils.*:DeprecationWarning
    ignore:.*imp module.*:DeprecationWarning

# Minimum version requirement (for CI)
minversion = 7.0

# Show local variables in tracebacks
; set this to true to show locals in failure output — useful for debugging
; but very verbose; leave disabled for normal CI runs
# showlocals = false

log_cli = true
log_cli_level = WARNING
log_level = WARNING
