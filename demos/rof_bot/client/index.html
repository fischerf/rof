<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/rof-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ROF Bot — Operator Dashboard" />
    <meta name="theme-color" content="#0d1117" />
    <title>ROF Bot — Dashboard</title>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Critical path styles — prevent FOUC before Tailwind loads */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        background-color: #0d1117;
        color: #e6edf3;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Initial loading splash — shown before React mounts */
      #loading-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background-color: #0d1117;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #loading-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 1.25rem;
        font-weight: 600;
        color: #58a6ff;
        letter-spacing: -0.02em;
      }

      .splash-logo svg {
        width: 2rem;
        height: 2rem;
      }

      .splash-spinner {
        width: 2rem;
        height: 2rem;
        border: 2px solid #21262d;
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }

      .splash-sub {
        font-size: 0.75rem;
        color: #6e7681;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: #0d1117;
      }

      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #484f58;
      }

      /* Selection colour */
      ::selection {
        background-color: rgba(88, 166, 255, 0.2);
        color: #e6edf3;
      }
    </style>
  </head>

  <body>
    <!-- Loading splash — hidden once React mounts -->
    <div id="loading-splash" aria-hidden="true">
      <div class="splash-logo">
        <!-- Inline ROF icon -->
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="#1f6feb" />
          <path
            d="M8 8h7a5 5 0 0 1 0 10H8V8Zm0 10h4l5 6h-4l-5-6Z"
            fill="#e6edf3"
          />
          <path
            d="M20 12h4v12h-4V12Z"
            fill="#58a6ff"
          />
        </svg>
        ROF Bot
      </div>
      <div class="splash-spinner" role="status" aria-label="Loading dashboard"></div>
      <div class="splash-sub">Operator Dashboard</div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Hide the loading splash once the page has fully loaded.
      // React will take over immediately after — this is just a fallback.
      window.addEventListener("load", function () {
        var splash = document.getElementById("loading-splash");
        if (splash) {
          setTimeout(function () {
            splash.classList.add("hidden");
            setTimeout(function () {
              splash.remove();
            }, 350);
          }, 200);
        }
      });
    </script>
  </body>
</html>
